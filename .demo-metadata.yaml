metadata:
  name: "OEMConnectedVehicle"
  version: "1.0"
  created: "2026-05-08"
  author: Fabric Ontology Demo Agent
  specVersion: "3.7"

demo:
  company: "NovaDrive Motors"
  industry: "Automotive OEM"
  domain: "Connected Vehicle Lifecycle (Manufacturing + Customer + Connected + Service + Warranty + Software + Sustainability)"
  description: "End-to-end OEM ontology with VIN as the universal identity spine, plus a ComplianceRule entity holding 8 natural-language regulatory + internal policies (IRA, EU Battery Reg, NHTSA T1+T2, CSRD, internal warranty + goodwill, OTA-CVE SLA) that the AI agent reads and reasons over. Spans 14 modules of the OEM value chain plus a governance overlay."
  useCases:
    - "Battery recall blast radius - 6-hop traversal across NMC cell lot, vehicle, customer, dealer, warranty"
    - "OTA software vulnerability - identify VINs running unpatched ADAS firmware (CVE-2026-AUTO-0042) and apply rule CR-OTA-CVE 30-day SLA"
    - "Manufacturing quality-telemetry correlation - find assembly stations whose temp/torque/cycle-time correlate with Critical defects"
    - "IRA Section 30D mineral compliance - rule-aware: agent reads CR-IRA-30D text and applies the FTA list from CR_NLText (no hard-coded country list)"
    - "NHTSA recall timing - rule-aware: agent applies CR-NHTSA-T1 (5-day notify, 60-day owner outreach)"
    - "Goodwill recommendation - rule-aware: agent applies CR-IW-GOOD boundary policy to recommend State='Goodwill' on borderline claims"
    - "Complete vehicle genealogy - 8-hop production order -> assembly -> component -> supplier in one query"
    - "Compliance Rules Explorer - browse, read full rule text, simulate what-if rule changes"

ontology:
  file: Ontology/oem-connected-vehicle-lifecycle.ttl
  namespace: http://example.com/oemconnectedvehicle#
  entities:
    - { name: ConnectedVehicle, key: VIN, keyType: string, hasTimeseries: true }
    - { name: VehicleVariant, key: VariantId, keyType: string, hasTimeseries: false }
    - { name: SoftwareRelease, key: SwReleaseId, keyType: string, hasTimeseries: false }
    - { name: CustomerProfile, key: CustomerId, keyType: string, hasTimeseries: false }
    - { name: VehicleOwner, key: OwnerId, keyType: string, hasTimeseries: false }
    - { name: DriveSession, key: SessionId, keyType: string, hasTimeseries: true }
    - { name: OTAUpdate, key: OTAUpdateId, keyType: string, hasTimeseries: false }
    - { name: ServiceVisit, key: VisitId, keyType: string, hasTimeseries: false }
    - { name: RepairTicket, key: TicketId, keyType: string, hasTimeseries: false }
    - { name: TechServiceBul, key: TSBId, keyType: string, hasTimeseries: false }
    - { name: WarrantyClaim, key: ClaimId, keyType: string, hasTimeseries: false }
    - { name: WarrantyPolicy, key: PolicyId, keyType: string, hasTimeseries: false }
    - { name: RecallCampaign, key: RecallId, keyType: string, hasTimeseries: false }
    - { name: BatteryPassport, key: BattPassId, keyType: string, hasTimeseries: false }
    - { name: Component, key: ComponentId, keyType: string, hasTimeseries: false }
    - { name: QualityEvent, key: EventId, keyType: string, hasTimeseries: false }
    - { name: Supplier, key: SupplierId, keyType: string, hasTimeseries: false }
    - { name: Assembly, key: AssemblyId, keyType: string, hasTimeseries: true }
    - { name: Facility, key: FacilityId, keyType: string, hasTimeseries: true }
    - { name: ProductionOrder, key: ProdOrderId, keyType: string, hasTimeseries: false }
    - { name: DealerLocation, key: DealerId, keyType: string, hasTimeseries: true }
    - { name: ComplianceRule, key: RuleId, keyType: string, hasTimeseries: false }

